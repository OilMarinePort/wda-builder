name: Build Signed WebDriverAgent
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master
      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
      - name: Build WDA
        run: |
          xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner -destination 'generic/platform=iOS' -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO ARCHS=arm64
      - name: Sign and Package
        run: |
          WDA_PATH=$(find ./build -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          echo "WDA: $WDA_PATH"
          test -n "$WDA_PATH" || exit 1
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict><key>get-task-allow</key><true/><key>platform-application</key><true/></dict></plist>' > ent.plist
          find "$WDA_PATH/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -exec codesign --force --sign - --timestamp=none {} \; 2>/dev/null || true
          codesign --force --sign - --entitlements ent.plist --timestamp=none "$WDA_PATH"
          mkdir -p Payload && cp -r "$WDA_PATH" Payload/
          zip -r WebDriverAgentRunner-signed.ipa Payload/
          ls -la WebDriverAgentRunner-signed.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-signed
          path: WebDriverAgentRunner-signed.ipa
          retention-days: 30
