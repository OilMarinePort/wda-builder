name: Build WDA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Setup Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 | tail -5

      - name: Package
        run: |
          APP=$(find ./build -name "WebDriverAgentRunner-Runner.app" -type d | head -1)
          XCTESTRUN=$(find ./build -name "*.xctestrun" -type f | head -1)
          echo "APP=$APP"
          echo "XCTESTRUN=$XCTESTRUN"
          mkdir -p output
          cp -r "$APP" output/
          [ -n "$XCTESTRUN" ] && cp "$XCTESTRUN" output/
          TEST=$(find ./build -name "WebDriverAgentRunner.xctest" -type d | head -1)
          [ -n "$TEST" ] && cp -r "$TEST" output/
          find output -maxdepth 2
          cd output && zip -r ../wda-bundle.zip . && cd ..
          ls -la wda-bundle.zip

      - uses: actions/upload-artifact@v4
        with:
          name: wda-bundle
          path: wda-bundle.zip
          retention-days: 30
